<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>諏訪湖花火大会 — 会場マップ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<!-- Pannellum CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#cc1e24;--red-dark:#9e1219;--gold:#e8b84b;
  --night:#0a0a14;--surface:#1a1a2e;
  --text:#f0eee8;--text-muted:#9896a8;--border:rgba(255,255,255,0.08);
}
html,body{height:100%;background:var(--night);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;}
header{position:relative;text-align:center;padding:2.5rem 1rem 2rem;background:linear-gradient(180deg,#0a0a14 0%,#12101e 100%);border-bottom:0.5px solid var(--border);overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 20% 50%,rgba(204,30,36,0.08) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at 80% 50%,rgba(232,184,75,0.06) 0%,transparent 70%);pointer-events:none;}
.header-eyebrow{font-size:11px;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:0.5rem;}
h1{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(22px,5vw,38px);color:var(--text);line-height:1.2;margin-bottom:0.4rem;}
h1 span{color:var(--gold);}
.header-sub{font-size:13px;color:var(--text-muted);}
#map-section{position:relative;max-width:960px;margin:2rem auto;padding:0 1rem;}
#map-wrapper{position:relative;border-radius:12px;overflow:hidden;border:0.5px solid var(--border);box-shadow:0 0 60px rgba(204,30,36,0.15);}
#map-img{width:100%;display:block;}
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;z-index:10;transition:transform 0.15s ease;}
.pin:hover{transform:translate(-50%,-50%) scale(1.12);}
.pin:hover .pin-label{background:var(--red-dark);}
.pin-label{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.5),0 0 0 1.5px rgba(255,255,255,0.15);transition:background 0.15s;text-align:center;line-height:1.4;}
.pin-needle{display:none;}
.pin-dot{display:none;}
.legend{max-width:960px;margin:0 auto 2rem;padding:0 1rem;display:flex;flex-wrap:wrap;gap:8px;}
.legend-item{display:flex;align-items:center;gap:6px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.legend-item:hover{border-color:var(--red);color:var(--text);}
.legend-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}

/* ── Overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px);}
.overlay.active{display:flex;}
.modal{background:var(--surface);border-radius:14px;width:min(760px,100%);overflow:hidden;border:0.5px solid rgba(255,255,255,0.12);box-shadow:0 20px 60px rgba(0,0,0,0.8);animation:modal-in 0.22s ease;display:flex;flex-direction:column;}
@keyframes modal-in{from{opacity:0;transform:scale(0.94) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(90deg,var(--red),var(--red-dark));flex-shrink:0;}
.modal-area-label{font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:0.1em;margin-bottom:2px;}
.modal-title{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:18px;color:#fff;}
.close-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
.close-btn:hover{background:rgba(255,255,255,0.3);}

/* Pannellum viewer */
#panorama-viewer{width:100%;height:340px;background:#000;position:relative;}
.no-pano{width:100%;height:340px;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-muted);font-size:13px;text-align:center;padding:1rem;}
.no-pano .icon{font-size:40px;opacity:0.3;}

.modal-footer{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-top:0.5px solid var(--border);flex-shrink:0;}
.modal-desc{font-size:13px;color:var(--text-muted);flex:1;}
.pano-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:0.5px solid var(--border);color:var(--text-muted);font-size:11px;padding:5px 12px;border-radius:20px;}
.pano-badge svg{opacity:0.6;}

.modal-hint{font-size:11px;color:var(--text-muted);padding:8px 18px;border-top:0.5px solid var(--border);opacity:0.6;text-align:center;line-height:1.6;}
footer{text-align:center;padding:2rem 1rem;font-size:12px;color:var(--text-muted);border-top:0.5px solid var(--border);margin-top:2rem;}

/* =============================================
   レスポンシブ対応
   ブレイクポイント:
     〜 390px : iPhone SE / 小型スマホ
     391〜 430px : iPhone 15 / 標準スマホ
     431〜 768px : iPad mini / タブレット
   ============================================= */

/* タブレット以下 */
@media (max-width: 768px) {
  header { padding: 1.5rem 1rem 1.2rem; }
  h1 { font-size: 24px; }
  .header-sub { font-size: 12px; }

  #map-section { margin: 1rem auto; padding: 0 0.5rem; }
  #map-wrapper { border-radius: 8px; }

  .legend { padding: 0 0.5rem; gap: 6px; }
  .legend-item { font-size: 11px; padding: 4px 10px; }

  .modal { border-radius: 10px; }
  .modal-title { font-size: 16px; }
  #panorama-viewer, .no-pano { height: 260px; }
  .modal-footer { flex-wrap: wrap; gap: 8px; }
  .modal-hint { font-size: 10px; }
}

/* iPhone 15 Pro / 標準スマホ（〜430px） */
@media (max-width: 430px) {
  header { padding: 1.2rem 0.75rem 1rem; }
  h1 { font-size: 20px; }
  .header-eyebrow { font-size: 10px; }
  .header-sub { font-size: 11px; }

  #map-section { padding: 0 0; margin: 0.75rem auto; }
  #map-wrapper { border-radius: 0; border-left: none; border-right: none; }

  .pin-label {
    font-size: 9px;
    padding: 3px 7px;
    border-radius: 12px;
  }

  .legend { padding: 0 0.75rem; gap: 5px; margin-bottom: 1.2rem; }
  .legend-item { font-size: 10px; padding: 4px 9px; }
  .legend-dot { width: 6px; height: 6px; }

  .overlay { padding: 0.75rem; align-items: center; }
  .modal {
    width: 100%;
    border-radius: 14px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header { padding: 12px 14px; }
  .modal-area-label { font-size: 10px; }
  .modal-title { font-size: 15px; }
  .close-btn { width: 28px; height: 28px; font-size: 16px; }

  #panorama-viewer, .no-pano { height: 220px; }

  .modal-footer { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
  .modal-desc { font-size: 12px; width: 100%; }
  .pano-badge { font-size: 10px; padding: 4px 10px; }
  .modal-hint { font-size: 10px; padding: 6px 14px; }

  footer { padding: 1.2rem 1rem; font-size: 11px; }
}

/* iPhone SE / 小型スマホ（〜390px） */
@media (max-width: 390px) {
  h1 { font-size: 18px; }
  .pin-label { font-size: 8px; padding: 2px 6px; }
  #panorama-viewer, .no-pano { height: 190px; }
}

</style>
</head>

    "label": "湖畔エリア",
    "x": 77,
    "y": 50,
    "desc": "湖畔エリア。湖側から花火を楽しめるエリアです。",
    "panoUrl": "images/kohann.jpg",
    "pitch": 0, "yaw": 0, "hfov": 100
  },
  {
    "id": "makkumi",
    "label": "間欠泉北エリア",
    "x": 89,
    "y": 33,
    "desc": "間欠泉北エリア。少し離れた場所からの観覧エリアです。",
    "panoUrl": "images/kannketusen.jpg",
    "pitch": 0, "yaw": 0, "hfov": 100
  }
];

// ──────────────────────────────
const mapWrapper  = document.getElementById('map-wrapper');
const overlay     = document.getElementById('overlay');
const modalTitle  = document.getElementById('modal-title');
const modalDesc   = document.getElementById('modal-desc');
const noPano      = document.getElementById('no-pano');
const viewerDiv   = document.getElementById('panorama-viewer');
const closeBtn    = document.getElementById('close-btn');
const legendEl    = document.getElementById('legend');
let viewer = null;

function buildPins() {
  AREAS.forEach(a => {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.style.left = a.x + '%';
    pin.style.top  = a.y + '%';
    pin.innerHTML  = '<div class="pin-dot"></div><div class="pin-needle"></div><div class="pin-label">' + a.label + '</div>';
    pin.addEventListener('click', () => openModal(a));
    mapWrapper.appendChild(pin);

    const chip = document.createElement('div');
    chip.className = 'legend-item';
    chip.innerHTML = '<span class="legend-dot"></span>' + a.label;
    chip.addEventListener('click', () => openModal(a));
    legendEl.appendChild(chip);
  });
}

function openModal(a) {
  modalTitle.textContent = a.label;
  modalDesc.textContent  = a.desc;

  // 前のviewerを破棄
  if (viewer) { try { viewer.destroy(); } catch(e){} viewer = null; }
  viewerDiv.innerHTML = '';

  if (a.panoUrl) {
    noPano.style.display  = 'none';
    viewerDiv.style.display = 'block';

    viewer = pannellum.viewer('panorama-viewer', {
      type:           'equirectangular',
      panorama:       a.panoUrl,
      autoLoad:       true,
      autoRotate:     -2,
      compass:        false,
      showZoomCtrl:   true,
      showFullscreenCtrl: true,
      pitch:          a.pitch || 0,
      yaw:            a.yaw   || 0,
      hfov:           a.hfov  || 100,
      strings: {
        loadingLabel: '読み込み中...',
        loadError:    '画像を読み込めませんでした'
      }
    });
  } else {
    noPano.style.display  = 'flex';
    viewerDiv.style.display = 'none';
  }

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
  if (viewer) { try { viewer.destroy(); } catch(e){} viewer = null; }
  viewerDiv.innerHTML = '';
}

closeBtn.addEventListener('click', closeModal);
// 背景クリック・ESCでは閉じない（×ボタンのみで閉じる）

// 画像の読み込みを待ってからピンを生成する
const mapImg = document.getElementById('map-img');
if (mapImg.complete && mapImg.naturalWidth > 0) {
  buildPins();
} else {
  mapImg.addEventListener('load', buildPins);
}
</script>
